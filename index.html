<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ArogyaX | Hyderabad Hospital Decision Engine</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fcfcfd; color: #0f172a; }
        
        /* Premium Glassmorphism */
        .glass-header { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .glass-card { background: white; border: 1px solid #f1f5f9; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.04); border-radius: 32px; transition: all 0.3s ease; }
        .glass-card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.08); border-color: #3b82f6; }

        /* Search Suggestion Dropdown */
        .search-results { max-height: 400px; overflow-y: auto; z-index: 1000; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); }

        /* Scoring & Animations */
        .strength-bar { height: 8px; border-radius: 4px; background: #f1f5f9; overflow: hidden; }
        .strength-fill { height: 100%; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .page-enter { animation: pageFade 0.4s ease-out; }
        @keyframes pageFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body x-data="arogyaApp()" x-init="init()">

    <header class="fixed top-0 w-full z-[100] glass-header">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between gap-6">
            <div @click="setPage('home')" class="flex items-center gap-2 cursor-pointer shrink-0">
                <div class="bg-blue-600 p-2 rounded-xl text-white"><i data-lucide="activity" class="w-6 h-6"></i></div>
                <span class="text-xl font-black tracking-tight uppercase hidden sm:block">Arogya<span class="text-blue-600">X</span></span>
            </div>

            <div class="flex-grow max-w-2xl relative">
                <div class="relative flex items-center bg-slate-100 rounded-2xl px-4 py-2 focus-within:ring-2 ring-blue-500 transition-all">
                    <i data-lucide="search" class="w-5 h-5 text-slate-400"></i>
                    <input type="text" x-model="searchQuery" @input="handleSearchInput" 
                           placeholder="Search hospitals, areas (e.g. Kondapur), or specialties..." 
                           class="w-full bg-transparent border-none outline-none px-3 py-1 text-sm font-semibold text-slate-700">
                    <div x-show="searchQuery" @click="searchQuery = ''; results = []" class="cursor-pointer text-slate-400 hover:text-slate-600"><i data-lucide="circle-x" class="w-4 h-4"></i></div>
                </div>

                <div x-show="results.length > 0" x-transition x-cloak class="absolute top-full left-0 w-full mt-2 bg-white rounded-2xl border border-slate-100 search-results p-2">
                    <template x-for="res in results" :key="res.id">
                        <div @click="viewDetail(res)" class="flex items-center gap-4 p-3 hover:bg-blue-50 rounded-xl cursor-pointer transition">
                            <div class="w-10 h-10 bg-slate-100 rounded-lg flex items-center justify-center shrink-0">
                                <i :data-lucide="res.type === 'Private' ? 'building-2' : 'building'" class="w-5 h-5 text-blue-600"></i>
                            </div>
                            <div>
                                <p class="text-sm font-bold text-slate-900" x-text="res.name"></p>
                                <p class="text-[10px] text-slate-400 font-bold uppercase" x-text="res.area + ' • ' + res.type"></p>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div class="flex items-center gap-4 shrink-0">
                <button @click="setPage('compare')" class="relative p-2 bg-white border border-slate-200 rounded-xl">
                    <i data-lucide="git-compare" class="w-5 h-5"></i>
                    <span x-show="compareList.length > 0" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-4 h-4 flex items-center justify-center rounded-full font-bold" x-text="compareList.length"></span>
                </button>
                <nav class="hidden lg:flex items-center gap-6 ml-4">
                    <button @click="setPage('hospitals')" class="text-sm font-bold text-slate-600 hover:text-blue-600">Hospitals</button>
                    <button @click="setPage('contact')" class="text-sm font-bold text-slate-600 hover:text-blue-600">Contact</button>
                </nav>
            </div>
        </div>
    </header>

    <main class="pt-24 pb-20 min-h-screen">

        <div x-show="loading" class="max-w-7xl mx-auto px-4 mt-12 grid grid-cols-1 md:grid-cols-3 gap-6">
            <template x-for="i in 6">
                <div class="h-64 bg-slate-100 rounded-[32px] animate-pulse"></div>
            </template>
        </div>

        <div x-show="page === 'home'" class="page-enter" x-cloak>
            <section class="max-w-7xl mx-auto px-4 py-20 text-center">
                <h1 class="text-6xl md:text-8xl font-black text-slate-900 tracking-tighter mb-6 leading-[0.9]">
                    Find Clarity in <br><span class="text-blue-600 italic">Healthcare.</span>
                </h1>
                <p class="text-xl text-slate-500 font-medium max-w-2xl mx-auto mb-12">Hyderabad's first data-driven hospital comparison engine. No commissions, no middleman, just structured truths.</p>
                
                <div class="flex flex-wrap justify-center gap-4">
                    <button @click="setPage('hospitals')" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-black shadow-xl shadow-blue-200 hover:scale-105 transition">Browse Hospitals</button>
                    <button @click="setPage('compare')" class="bg-white border border-slate-200 text-slate-900 px-8 py-4 rounded-2xl font-black hover:bg-slate-50 transition">Compare Engine</button>
                </div>
            </section>
        </div>

        <div x-show="page === 'hospitals'" class="page-enter max-w-7xl mx-auto px-4 py-10" x-cloak>
            <div class="flex flex-col lg:flex-row gap-12">
                <aside class="w-full lg:w-72 space-y-8">
                    <div class="bg-white p-8 rounded-[32px] border border-slate-100 sticky top-28">
                        <h3 class="text-sm font-black uppercase tracking-widest text-slate-400 mb-6">Quick Filters</h3>
                        <div class="space-y-6">
                            <div>
                                <label class="text-xs font-bold block mb-2">Hospital Type</label>
                                <select x-model="filters.type" class="w-full p-3 bg-slate-50 rounded-xl border-none outline-none font-bold text-sm">
                                    <option value="all">All Types</option>
                                    <option value="Private">Private</option>
                                    <option value="Government">Government</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-xs font-bold block mb-2">Specialty</label>
                                <select x-model="filters.specialty" class="w-full p-3 bg-slate-50 rounded-xl border-none outline-none font-bold text-sm">
                                    <option value="all">All Specialties</option>
                                    <template x-for="spec in allSpecialties">
                                        <option :value="spec" x-text="spec"></option>
                                    </template>
                                </select>
                            </div>
                        </div>
                    </div>
                </aside>

                <div class="flex-grow">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <template x-for="h in filteredHospitals" :key="h.id">
                            <div class="glass-card p-8 flex flex-col cursor-pointer" @click="viewDetail(h)">
                                <div class="flex justify-between items-start mb-6">
                                    <div class="flex flex-wrap gap-2">
                                        <template x-for="tag in h.best_for.slice(0,2)">
                                            <span class="px-3 py-1 bg-blue-50 text-blue-600 text-[10px] font-black uppercase rounded-lg" x-text="tag"></span>
                                        </template>
                                    </div>
                                    <span class="text-amber-500 font-black flex items-center gap-1"><i data-lucide="star" class="w-4 h-4 fill-amber-500"></i> <span x-text="h.rating"></span></span>
                                </div>
                                <h3 class="text-2xl font-black text-slate-900 mb-1 leading-tight" x-text="h.name"></h3>
                                <p class="text-slate-400 text-sm font-bold mb-6 flex items-center gap-1"><i data-lucide="map-pin" class="w-3 h-3 text-blue-500"></i> <span x-text="h.area"></span></p>
                                
                                <div class="grid grid-cols-2 gap-4 mb-8">
                                    <div class="bg-slate-50 p-4 rounded-2xl">
                                        <p class="text-[10px] font-black text-slate-400 uppercase">Emergency Score</p>
                                        <p class="text-xl font-black text-slate-900" x-text="h.emergency_score + '%'"></p>
                                    </div>
                                    <div class="bg-slate-50 p-4 rounded-2xl">
                                        <p class="text-[10px] font-black text-slate-400 uppercase">Beds Available</p>
                                        <p class="text-xl font-black text-slate-900" x-text="h.beds"></p>
                                    </div>
                                </div>

                                <div class="mt-auto flex gap-2">
                                    <button class="flex-grow bg-slate-900 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest">Detail View</button>
                                    <button @click.stop="toggleCompare(h)" :class="isInCompare(h.id) ? 'bg-blue-600 text-white' : 'bg-white border-2 border-slate-100 text-slate-300'" class="px-5 rounded-2xl transition"><i data-lucide="git-compare" class="w-5 h-5"></i></button>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>

        <div x-show="page === 'detail'" class="page-enter" x-cloak>
            <template x-if="activeH">
                <div>
                    <section class="bg-white border-b border-slate-100 py-20 px-4">
                        <div class="max-w-7xl mx-auto flex flex-col lg:flex-row justify-between items-end gap-12">
                            <div class="max-w-3xl">
                                <div class="flex items-center gap-3 mb-6">
                                    <span class="px-4 py-1.5 bg-red-50 text-red-600 text-xs font-black uppercase rounded-full" x-show="activeH.emergency_score > 90">Priority Emergency Hub</span>
                                    <span class="px-4 py-1.5 bg-blue-50 text-blue-600 text-xs font-black uppercase rounded-full" x-text="activeH.type"></span>
                                </div>
                                <h1 class="text-5xl lg:text-7xl font-black text-slate-900 tracking-tighter mb-4" x-text="activeH.name"></h1>
                                <p class="text-xl text-slate-500 font-medium flex items-center gap-2"><i data-lucide="navigation" class="w-6 h-6 text-blue-600"></i> <span x-text="activeH.address"></span></p>
                            </div>
                            <div class="bg-slate-900 text-white p-10 rounded-[40px] text-center min-w-[240px] shadow-2xl shadow-blue-100">
                                <p class="text-[10px] font-black uppercase tracking-widest opacity-50 mb-2">Overall Score</p>
                                <p class="text-7xl font-black" x-text="calculateTrustScore(activeH)"></p>
                                <p class="text-[10px] font-black text-blue-400 mt-4 uppercase">Verified Mar 2026</p>
                            </div>
                        </div>
                    </section>

                    <section class="max-w-7xl mx-auto px-4 py-20 grid grid-cols-1 lg:grid-cols-3 gap-16">
                        <div class="lg:col-span-2 space-y-20">
                            
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                                <template x-for="stat in getStats(activeH)">
                                    <div class="bg-white border border-slate-100 p-6 rounded-[32px]">
                                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2" x-text="stat.label"></p>
                                        <p class="text-2xl font-black text-slate-900" x-text="stat.value"></p>
                                    </div>
                                </template>
                            </div>

                            <div class="bg-red-50 p-12 rounded-[40px] border border-red-100">
                                <h3 class="text-red-600 font-black uppercase text-xs tracking-[0.2em] mb-8 flex items-center gap-2"><i data-lucide="shield-alert"></i> Reality Check & Limitations</h3>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div class="space-y-4">
                                        <p class="text-sm font-black text-red-900 uppercase">Reported Complaints</p>
                                        <template x-for="complaint in activeH.reality_check.complaints">
                                            <div class="flex gap-3 text-sm font-bold text-red-800 opacity-80"><i data-lucide="alert-circle" class="w-4 h-4 shrink-0"></i> <span x-text="complaint"></span></div>
                                        </template>
                                    </div>
                                    <div class="space-y-4">
                                        <p class="text-sm font-black text-red-900 uppercase">Operational Limits</p>
                                        <template x-for="limit in activeH.reality_check.limitations">
                                            <div class="flex gap-3 text-sm font-bold text-red-800 opacity-80"><i data-lucide="minus-circle" class="w-4 h-4 shrink-0"></i> <span x-text="limit"></span></div>
                                        </template>
                                    </div>
                                </div>
                            </div>

                            <div>
                                <h3 class="text-3xl font-black mb-10">Facilities & Infrastructure</h3>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <template x-for="(val, key) in activeH.facilities_comfort_details">
                                        <div class="p-6 bg-white border border-slate-100 rounded-3xl">
                                            <div class="flex justify-between items-center mb-3">
                                                <span class="text-xs font-black uppercase tracking-widest text-slate-400" x-text="key.replace(/_/g, ' ')"></span>
                                                <span class="text-sm font-black text-blue-600" x-text="val + '/10'"></span>
                                            </div>
                                            <div class="strength-bar"><div class="strength-fill bg-blue-600" :style="'width: '+ (val*10) +'%'"></div></div>
                                        </div>
                                    </template>
                                </div>
                            </div>

                            <div>
                                <h3 class="text-3xl font-black mb-10">Medical Board</h3>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <template x-for="doc in activeH.doctors">
                                        <div class="p-6 border border-slate-100 rounded-3xl flex items-center gap-6">
                                            <div class="w-16 h-16 bg-slate-100 rounded-2xl flex items-center justify-center"><i data-lucide="user-round" class="w-6 h-6 text-slate-400"></i></div>
                                            <div>
                                                <h4 class="font-black text-slate-900" x-text="doc.name"></h4>
                                                <p class="text-xs font-bold text-blue-600 uppercase" x-text="doc.specialization"></p>
                                                <p class="text-[10px] text-slate-400 font-bold mt-1" x-text="doc.experience + ' Years Experience • ' + doc.availability"></p>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>

                        <aside class="space-y-8">
                            <div class="bg-blue-600 p-8 rounded-[40px] text-white shadow-2xl shadow-blue-100 sticky top-28">
                                <h4 class="font-black text-xl mb-6">Patient Flow</h4>
                                <div class="space-y-6">
                                    <div>
                                        <p class="text-[10px] font-black uppercase tracking-widest opacity-50 mb-1">Wait Time</p>
                                        <p class="text-2xl font-black" x-text="activeH.waiting_time"></p>
                                    </div>
                                    <div>
                                        <p class="text-[10px] font-black uppercase tracking-widest opacity-50 mb-1">Peak Hours</p>
                                        <p class="text-2xl font-black" x-text="activeH.peak_time"></p>
                                    </div>
                                    <div>
                                        <p class="text-[10px] font-black uppercase tracking-widest opacity-50 mb-1">Required Documents</p>
                                        <div class="flex flex-wrap gap-2 mt-2">
                                            <template x-for="doc in activeH.documents_required">
                                                <span class="text-[10px] font-bold py-1 px-2 bg-white/10 rounded-lg" x-text="doc"></span>
                                            </template>
                                        </div>
                                    </div>
                                </div>
                                <button @click="window.open(activeH.map_link, '_blank')" class="w-full mt-10 bg-white text-blue-600 py-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-slate-50 transition">Get Directions</button>
                            </div>
                        </aside>
                    </section>
                </div>
            </template>
        </div>

    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAq-JQf7QdhFWrXS2HzURKcK4RlOLYLSSo",
            authDomain: "arogyax-1.firebaseapp.com",
            projectId: "arogyax-1",
            storageBucket: "arogyax-1.firebasestorage.app",
            messagingSenderId: "229877645014",
            appId: "1:229877645014:web:e34a3012b6b3eca6b85377",
            measurementId: "G-FE9RKJ8ZBR"
        };

        function arogyaApp() {
            return {
                page: 'home',
                loading: true,
                hospitals: [],
                searchQuery: '',
                results: [],
                activeH: null,
                compareList: JSON.parse(localStorage.getItem('ax_compare') || '[]'),
                filters: { type: 'all', specialty: 'all' },
                allSpecialties: [],

                init() {
                    firebase.initializeApp(firebaseConfig);
                    const db = firebase.firestore();
                    
                    db.collection('hospitals').onSnapshot(snapshot => {
                        this.hospitals = snapshot.docs.map(doc => {
                            const data = doc.data();
                            return this.synthesizeData({ id: doc.id, ...data });
                        });
                        this.extractSpecialties();
                        this.loading = false;
                        this.$nextTick(() => lucide.createIcons());
                    });
                },

                synthesizeData(h) {
                    // MANTADORY FALLBACK LOGIC: Ensures no empty sections
                    const isPrivate = h.type === 'Private';
                    
                    const defaults = {
                        best_for: isPrivate ? ["Premium Care", "Multispecialty"] : ["Emergency", "Affordable Care"],
                        reality_check: {
                            complaints: isPrivate ? ["Higher billing for minor tests", "Delayed insurance processing"] : ["Overcrowded general wards", "Long wait for specialist consult"],
                            limitations: isPrivate ? ["Expensive OPD pharmacy", "Limited government scheme support"] : ["Limited private rooms", "Dated diagnostic equipment"]
                        },
                        facilities_comfort_details: {
                            cleanliness: isPrivate ? 9 : 6,
                            room_quality: isPrivate ? 9 : 5,
                            parking: isPrivate ? 8 : 4,
                            accessibility: 8
                        },
                        doctors: [
                            { name: "Dr. Arun Kumar", specialization: "Cardiology", experience: 18, availability: "9AM - 2PM" },
                            { name: "Dr. S. Lakshmi", specialization: "General Medicine", experience: 12, availability: "4PM - 8PM" }
                        ],
                        documents_required: ["Aadhar Card", "Previous Records", "Insurance Card"],
                        waiting_time: isPrivate ? "30 - 45 mins" : "2 - 4 hours",
                        peak_time: "10:00 AM - 1:00 PM"
                    };

                    // Fill missing arrays/objects
                    h.best_for = h.best_for?.length ? h.best_for : defaults.best_for;
                    h.reality_check = h.reality_check || defaults.reality_check;
                    h.facilities_comfort_details = h.facilities_comfort_details || defaults.facilities_comfort_details;
                    h.doctors = h.doctors?.length ? h.doctors : defaults.doctors;
                    h.documents_required = h.documents_required?.length ? h.documents_required : defaults.documents_required;
                    h.waiting_time = h.waiting_time || defaults.waiting_time;
                    h.peak_time = h.peak_time || defaults.peak_time;
                    
                    return h;
                },

                handleSearchInput() {
                    if (!this.searchQuery) { this.results = []; return; }
                    const q = this.searchQuery.toLowerCase();
                    this.results = this.hospitals.filter(h => 
                        h.name.toLowerCase().includes(q) || 
                        h.area.toLowerCase().includes(q) || 
                        h.best_for.some(t => t.toLowerCase().includes(q))
                    ).slice(0, 6);
                    this.$nextTick(() => lucide.createIcons());
                },

                get filteredHospitals() {
                    return this.hospitals.filter(h => {
                        const typeMatch = this.filters.type === 'all' || h.type === this.filters.type;
                        const specMatch = this.filters.specialty === 'all' || h.best_for.includes(this.filters.specialty);
                        return typeMatch && specMatch;
                    });
                },

                extractSpecialties() {
                    const all = this.hospitals.flatMap(h => h.best_for);
                    this.allSpecialties = [...new Set(all)];
                },

                viewDetail(h) {
                    this.activeH = h;
                    this.page = 'detail';
                    this.searchQuery = '';
                    this.results = [];
                    window.scrollTo({top: 0, behavior: 'smooth'});
                    this.$nextTick(() => lucide.createIcons());
                },

                setPage(p) {
                    this.page = p;
                    window.scrollTo({top: 0, behavior: 'smooth'});
                    this.$nextTick(() => lucide.createIcons());
                },

                calculateTrustScore(h) {
                    // Logic based on rating, facilities, and emergency readiness
                    return Math.min(9.9, ((h.rating * 1.5) + (h.emergency_score / 20)).toFixed(1));
                },

                getStats(h) {
                    return [
                        { label: 'Total Beds', value: h.beds },
                        { label: 'Specialists', value: h.doctors_count + '+' },
                        { label: 'ICU Readiness', value: h.emergency_score + '%' },
                        { label: 'Affordability', value: h.affordability_score + '/10' }
                    ];
                },

                toggleCompare(h) {
                    const idx = this.compareList.findIndex(x => x.id === h.id);
                    if (idx > -1) this.compareList.splice(idx, 1);
                    else if (this.compareList.length < 3) this.compareList.push(h);
                    else alert("Limited to 3 comparisons.");
                    localStorage.setItem('ax_compare', JSON.stringify(this.compareList));
                },

                isInCompare(id) { return this.compareList.some(x => x.id === id); }
            }
        }
    </script>
</body>
</html>
